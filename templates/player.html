<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>ICode 签到</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700;900&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════
   CODE PLANET THEME TOKENS
═══════════════════════════════════ */
:root {
  --bg-deep:    #deeeff;
  --bg-card:    #ffffff;
  --bg-card2:   #eef6ff;
  --cyan:       #0099cc;
  --cyan-dim:   rgba(0,153,204,.1);
  --cyan-glow:  rgba(0,153,204,.2);
  --orange:     #e85d20;
  --orange-dim: rgba(232,93,32,.12);
  --green:      #00a854;
  --text:       #0a1f44;
  --text-dim:   #4a7fa5;
  --border:     rgba(0,150,220,.2);
  --radius:     16px;
}

/* ═══════════════════════════════════
   BASE
═══════════════════════════════════ */
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overscroll-behavior:none}

body{
  font-family:'Noto Sans SC',sans-serif;
  background:var(--bg-deep);
  color:var(--text);
  max-width:430px;
  margin:0 auto;
  min-height:100vh;
  position:relative;
}

/* Grid texture */
body::before{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:
    linear-gradient(rgba(0,150,220,.07) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,150,220,.07) 1px, transparent 1px);
  background-size:40px 40px;
}

/* ═══════════════════════════════════
   STATUS BAR
═══════════════════════════════════ */
.statusbar{
  height:44px;
  background:#c8e6f7;
  display:flex;align-items:center;
  justify-content:space-between;
  padding:0 20px;
  padding-top:env(safe-area-inset-top);
  position:relative;z-index:10;
  border-bottom:1px solid rgba(0,150,220,.15);
}
.sb-time{
  font-family:'Orbitron',sans-serif;
  color:#0077aa;font-size:13px;font-weight:700;
  letter-spacing:2px;
}
.sb-icons{
  display:flex;align-items:center;gap:6px;
  font-size:12px;color:#4a7fa5;
  font-family:'Orbitron',sans-serif;font-size:10px;
}

/* ═══════════════════════════════════
   BANNER — Dynamic, Competition-branded
═══════════════════════════════════ */
.banner{
  position:relative;
  overflow:hidden;
  background:#1a6fa8;
  border-bottom:1px solid rgba(0,150,220,.25);
}

/* Animated starfield */
.stars{position:absolute;inset:0;pointer-events:none}
.star{
  position:absolute;border-radius:50%;
  background:rgba(255,255,255,.6);
  animation:twinkle var(--dur,3s) var(--del,0s) ease-in-out infinite alternate;
}
@keyframes twinkle{from{opacity:.1;transform:scale(1)}to{opacity:.6;transform:scale(1.5)}}

/* Radial glow pulse */
.banner-glow{
  position:absolute;
  width:300px;height:300px;
  border-radius:50%;
  background:radial-gradient(var(--glow,rgba(255,255,255,.15)),transparent 70%);
  top:-80px;right:-60px;
  animation:pulse-glow 4s ease-in-out infinite alternate;
  pointer-events:none;
}
@keyframes pulse-glow{from{transform:scale(1);opacity:.7}to{transform:scale(1.2);opacity:1}}

/* Scan line effect */
.scanline{
  position:absolute;inset:0;pointer-events:none;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(255,255,255,.04) 2px,rgba(255,255,255,.04) 4px);
}

.banner-inner{position:relative;z-index:1;padding:18px 18px 28px}

/* Top nav */
.banner-nav{
  display:flex;align-items:center;justify-content:center;
  margin-bottom:20px;gap:16px;
}
.brand{display:flex;align-items:center;gap:10px}
.brand-logo{
  width:38px;height:38px;
  border:2px solid rgba(255,255,255,.8);
  border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-family:'Orbitron',sans-serif;
  font-size:16px;font-weight:900;
  color:#fff;
  box-shadow:0 0 16px rgba(255,255,255,.2),inset 0 0 12px rgba(255,255,255,.1);
  background:rgba(255,255,255,.15);
}
.brand-info{line-height:1}
.brand-name{
  font-family:'Orbitron',sans-serif;
  font-size:14px;font-weight:900;
  color:#fff;letter-spacing:2px;
  text-align:center;
}
.brand-sub{font-size:10px;color:rgba(255,255,255,.65);letter-spacing:1px;margin-top:2px;text-align:center;}

/* Live indicator */
.live-dot{
  display:flex;align-items:center;gap:6px;
  font-size:11px;color:rgba(255,220,100,.95);
  font-weight:600;letter-spacing:1px;
}
.live-pulse{
  width:8px;height:8px;border-radius:50%;background:rgba(255,220,100,.95);
  animation:live-anim 1.2s ease-in-out infinite;
}
@keyframes live-anim{
  0%,100%{box-shadow:0 0 0 0 rgba(255,107,53,.5)}
  50%{box-shadow:0 0 0 6px rgba(255,107,53,0)}
}

/* Eyebrow */
.banner-eyebrow{
  display:flex;align-items:center;gap:8px;margin-bottom:10px;
}
.eyebrow-line{
  flex:1;height:1px;
  background:linear-gradient(90deg,rgba(255,255,255,.5),transparent);
  opacity:.6;
}
.eyebrow-text{
  font-size:10px;color:rgba(255,255,255,.75);
  font-family:'Orbitron',sans-serif;
  letter-spacing:3px;white-space:nowrap;
}

/* Title */
.banner-title{
  font-size:20px;font-weight:900;
  color:#fff;
  line-height:1.4;margin-bottom:14px;
  text-shadow:0 2px 12px rgba(0,0,0,.2);
}
.banner-title .hl{
  color:#ffe066;
  font-family:'Orbitron',sans-serif;
  font-size:22px;
  text-shadow:0 0 20px rgba(255,224,102,.5);
}

/* Meta badges */
.banner-meta{display:flex;flex-wrap:wrap;gap:8px}
.meta-badge{
  display:flex;align-items:center;gap:5px;
  border:1px solid rgba(255,255,255,.3);
  border-radius:20px;padding:4px 12px;
  font-size:11px;color:rgba(255,255,255,.85);
  background:rgba(255,255,255,.12);
  backdrop-filter:blur(4px);
}

/* Curved connector to content */
.banner::after{
  content:'';position:absolute;
  bottom:-1px;left:0;right:0;height:20px;
  background:#deeeff;
  border-radius:20px 20px 0 0;
}

/* ═══════════════════════════════════
   NOTICE
═══════════════════════════════════ */
.notice{
  display:none;
  margin:14px 14px 0;
  border:1px solid rgba(255,107,53,.25);
  border-left:3px solid var(--orange);
  border-radius:12px;
  padding:12px 14px;
  background:rgba(255,107,53,.06);
  gap:10px;align-items:flex-start;
  position:relative;z-index:1;
}
.notice.show{display:flex}
.notice-text{font-size:13px;color:var(--text-dim);line-height:1.7}

/* ═══════════════════════════════════
   CONTENT
═══════════════════════════════════ */
.content{padding:14px 14px 100px;position:relative;z-index:1}

/* ═══════════════════════════════════
   GLASS CARD
═══════════════════════════════════ */
.card{
  background:var(--bg-card);
  border:1px solid rgba(0,150,220,.18);
  border-radius:var(--radius);
  margin-bottom:12px;
  overflow:hidden;
  box-shadow:0 4px 20px rgba(0,100,180,.08),inset 0 1px 0 rgba(255,255,255,.8);
}
.card-head{
  padding:14px 16px;
  display:flex;align-items:center;gap:10px;
  border-bottom:1px solid rgba(0,150,220,.12);
  background:rgba(0,150,220,.04);
}
.ch-icon{
  width:28px;height:28px;border-radius:8px;
  border:1px solid rgba(0,153,204,.25);
  display:flex;align-items:center;justify-content:center;
  font-size:13px;
  background:rgba(0,153,204,.08);
  color:var(--cyan);
}
.ch-title{font-size:13px;font-weight:700;color:var(--text);letter-spacing:.5px}
.card-body{padding:14px 16px}

/* ═══════════════════════════════════
   QUERY
═══════════════════════════════════ */
.query-hint{
  font-size:13px;color:var(--text-dim);
  margin-bottom:12px;line-height:1.6;
}
.query-hint strong{color:var(--cyan)}

.err-bar{
  display:none;
  background:rgba(255,60,60,.08);
  border:1px solid rgba(255,60,60,.2);
  border-radius:10px;padding:10px 14px;
  font-size:13px;color:#ff6b6b;
  align-items:center;gap:8px;margin-bottom:10px;
}
.err-bar.show{display:flex}

.input-wrap{position:relative}
.input-icon{
  position:absolute;left:14px;top:50%;transform:translateY(-50%);
  font-size:16px;color:var(--text-dim);pointer-events:none;
}
.query-input{
  width:100%;
  background:#f4f9ff;
  border:1.5px solid rgba(0,150,220,.2);
  border-radius:12px;
  padding:14px 14px 14px 44px;
  font-size:14px;font-family:inherit;
  color:var(--text);outline:none;
  resize:none;min-height:52px;
  transition:border-color .2s,box-shadow .2s;
  line-height:1.5;
}
.query-input:focus{
  border-color:var(--cyan);
  box-shadow:0 0 0 3px rgba(0,153,204,.1);
  background:#fff;
}
.query-input::placeholder{color:rgba(74,127,165,.4);font-size:13px}

.tip-row{
  display:flex;align-items:center;gap:7px;
  font-size:12px;color:var(--text-dim);
  margin-top:8px;padding:0 2px;
}
.tip-dot{width:5px;height:5px;border-radius:50%;background:var(--cyan);flex-shrink:0}

/* ═══════════════════════════════════
   QUERY BUTTON
═══════════════════════════════════ */
.btn-query{
  width:100%;margin-top:14px;
  background:linear-gradient(135deg,#0077bb 0%,#0099cc 100%);
  border:none;border-radius:12px;
  padding:16px;color:#fff;
  font-size:15px;font-weight:900;font-family:'Orbitron',sans-serif;
  cursor:pointer;transition:all .2s;
  letter-spacing:2px;
  box-shadow:0 6px 20px rgba(0,153,204,.3);
  position:relative;overflow:hidden;
}
.btn-query::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,.15),transparent);
}
.btn-query:hover{
  box-shadow:0 8px 32px rgba(0,153,204,.35),0 0 40px rgba(0,153,204,.12);
  transform:translateY(-1px);
}
.btn-query:active{transform:scale(.99);box-shadow:0 3px 12px rgba(0,153,204,.2)}
.btn-query:disabled{
  background:rgba(122,155,181,.2);border:1px solid var(--border);
  color:var(--text-dim);box-shadow:none;cursor:not-allowed;transform:none;
}

/* ═══════════════════════════════════
   RESULTS HEADER
═══════════════════════════════════ */
.results{display:none}
.results.show{display:block}
.results-hd{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:12px;
}
.results-label{
  font-family:'Orbitron',sans-serif;
  font-size:12px;color:var(--cyan);letter-spacing:2px;
}
.results-count{
  font-size:12px;color:var(--text-dim);
  background:var(--cyan-dim);
  border:1px solid var(--border);
  border-radius:20px;padding:3px 12px;
}

/* ═══════════════════════════════════
   SINGLE PLAYER CARD
═══════════════════════════════════ */
.pcard{
  background:#fff;
  border:1.5px solid rgba(0,150,220,.18);
  border-radius:var(--radius);
  overflow:hidden;margin-bottom:10px;
  transition:border-color .2s,box-shadow .2s;
  box-shadow:0 2px 12px rgba(0,100,180,.08);
}
.pcard.selectable{cursor:pointer}
.pcard.selected{
  border-color:var(--cyan);
  box-shadow:0 0 0 2px rgba(0,153,204,.15),0 4px 20px rgba(0,153,204,.12);
}
.pcard.done{
  opacity:.6;cursor:not-allowed;
  filter:grayscale(.3);
}

.pcard-hero{
  background:linear-gradient(135deg,#1a6fa8,#2196c4);
  padding:16px;
  display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid rgba(0,150,220,.15);
  position:relative;overflow:hidden;
}
.pcard-hero::before{
  content:'';position:absolute;top:-40px;right:-40px;
  width:120px;height:120px;border-radius:50%;
  background:radial-gradient(rgba(255,255,255,.12),transparent 70%);
}

.pcard-left{display:flex;align-items:center;gap:12px;position:relative;z-index:1}
.pcard-avatar{
  width:48px;height:48px;border-radius:50%;
  border:2px solid rgba(255,255,255,.7);
  display:flex;align-items:center;justify-content:center;
  font-size:20px;font-weight:900;
  color:#fff;
  background:rgba(255,255,255,.2);
  box-shadow:0 0 16px rgba(255,255,255,.2);
  flex-shrink:0;
}
.pcard-name{font-size:18px;font-weight:900;color:#fff}
.pcard-no{font-size:11px;color:rgba(255,255,255,.65);margin-top:3px;font-family:monospace;letter-spacing:1px}

.status-pill{
  padding:5px 13px;border-radius:20px;
  font-size:11px;font-weight:700;
  position:relative;z-index:1;letter-spacing:.5px;
}
.sp-pending{
  border:1px solid rgba(255,200,100,.5);
  color:#ffe066;background:rgba(255,200,80,.15);
}
.sp-done{
  border:1px solid rgba(255,255,255,.4);
  color:#fff;background:rgba(255,255,255,.15);
}

.pcard-fields{
  padding:14px;
  display:grid;grid-template-columns:1fr 1fr;
  gap:8px;
}
.pf-item{
  background:#f0f8ff;
  border:1px solid rgba(0,150,220,.1);
  border-radius:10px;padding:10px 12px;
}
.pf-item.full{grid-column:1/-1}
.pf-label{
  font-size:10px;color:var(--text-dim);
  margin-bottom:4px;letter-spacing:1px;
  text-transform:uppercase;
}
.pf-value{font-size:13px;font-weight:600;color:var(--text)}

.pcard-sel{
  padding:10px 16px;
  border-top:1px solid rgba(0,150,220,.1);
  display:flex;align-items:center;gap:8px;
  font-size:12px;color:var(--text-dim);
  background:rgba(0,150,220,.02);
}
.sel-chk{
  width:20px;height:20px;border-radius:6px;
  border:2px solid rgba(0,150,220,.25);
  display:flex;align-items:center;justify-content:center;
  font-size:11px;color:#fff;
  transition:all .2s;
  background:transparent;
}
.pcard.selected .sel-chk{
  background:var(--cyan);border-color:var(--cyan);
}

/* ═══════════════════════════════════
   MULTI TABLE
═══════════════════════════════════ */
.tbl-scroll{
  overflow-x:auto;
  border:1px solid rgba(0,150,220,.15);
  border-radius:12px;
  background:#fff;
}
table{width:100%;border-collapse:collapse;min-width:480px}
thead tr{background:linear-gradient(135deg,#1a6fa8,#2196c4);border-bottom:1px solid rgba(0,150,220,.2)}
th{
  padding:10px 13px;text-align:left;
  font-size:10px;color:rgba(255,255,255,.85);
  font-family:'Orbitron',sans-serif;
  letter-spacing:1px;white-space:nowrap;
}
td{
  padding:11px 13px;font-size:12px;
  color:var(--text);border-top:1px solid rgba(0,150,220,.07);
  white-space:nowrap;
}
tr.tr-done td{color:var(--text-dim)}
tr.tr-sel td{background:rgba(0,153,204,.04)}
.tcb{
  width:18px;height:18px;border-radius:5px;
  border:1.5px solid rgba(0,150,220,.25);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:10px;color:#fff;
  transition:all .2s;background:transparent;
}
.tcb.on{background:var(--cyan);border-color:var(--cyan)}

/* ═══════════════════════════════════
   SHIRT SIZE BADGE
═══════════════════════════════════ */
.shirt{
  display:inline-block;
  padding:2px 8px;border-radius:5px;
  font-size:11px;font-weight:700;
  font-family:'Orbitron',sans-serif;
}

/* ═══════════════════════════════════
   CHECKIN BUTTON
═══════════════════════════════════ */
.btn-checkin{
  width:100%;margin-top:14px;
  background:linear-gradient(135deg,#16a34a 0%,#22c55e 100%);
  border:none;border-radius:12px;
  padding:16px;color:#fff;
  font-size:15px;font-weight:900;font-family:'Orbitron',sans-serif;
  cursor:pointer;transition:all .2s;
  letter-spacing:1.5px;
  box-shadow:0 6px 20px rgba(22,163,74,.25);
}
.btn-checkin:hover{box-shadow:0 8px 28px rgba(22,163,74,.35);transform:translateY(-1px)}
.btn-checkin:active{transform:scale(.99)}
.btn-checkin:disabled{
  background:#d1d5db;border:1px solid #e5e7eb;
  color:#9ca3af;box-shadow:none;cursor:not-allowed;transform:none;
}

/* ═══════════════════════════════════
   SUCCESS SCREEN
═══════════════════════════════════ */
.success{
  display:none;position:fixed;inset:0;z-index:300;
  flex-direction:column;align-items:center;justify-content:center;
  text-align:center;padding:40px 28px;
  background:radial-gradient(ellipse at 50% 30%,rgba(0,153,204,.1) 0%,#e0f2ff 60%);
}
.success.show{display:flex}
.success::before{
  content:'';position:absolute;inset:0;z-index:0;
  background-image:
    linear-gradient(rgba(0,150,220,.06) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,150,220,.06) 1px,transparent 1px);
  background-size:40px 40px;
}

/* Confetti */
.confetti-wrap{position:absolute;inset:0;pointer-events:none;overflow:hidden;z-index:0}
.conf{
  position:absolute;
  animation:conffall var(--dur,3s) var(--del,0s) linear infinite;
  opacity:0;
}
@keyframes conffall{
  0%{transform:translateY(-20px) rotate(0deg);opacity:1}
  100%{transform:translateY(calc(100vh + 20px)) rotate(720deg);opacity:0}
}

.success-ring{
  width:100px;height:100px;border-radius:50%;
  border:3px solid #16a34a;
  display:flex;align-items:center;justify-content:center;
  font-size:44px;
  box-shadow:0 0 0 14px rgba(22,163,74,.08),0 8px 30px rgba(22,163,74,.2);
  margin-bottom:24px;
  animation:ring-pop .5s cubic-bezier(.175,.885,.32,1.275) both;
  position:relative;z-index:1;
  background:rgba(22,163,74,.06);
}
@keyframes ring-pop{from{transform:scale(0);opacity:0}to{transform:scale(1);opacity:1}}

.success-title{
  font-family:'Orbitron',sans-serif;
  font-size:24px;font-weight:900;
  color:#16a34a;letter-spacing:2px;
  text-shadow:0 2px 8px rgba(22,163,74,.15);
  position:relative;z-index:1;
  margin-bottom:8px;
}
.success-sub{font-size:13px;color:var(--text-dim);position:relative;z-index:1;margin-bottom:18px}

.success-names{
  background:#fff;
  border:1px solid rgba(0,150,220,.18);
  border-radius:12px;padding:14px 24px;
  font-size:18px;font-weight:700;color:var(--text);
  margin-bottom:20px;width:100%;max-width:300px;
  position:relative;z-index:1;
  box-shadow:0 2px 12px rgba(0,100,180,.08);
}

.success-wish{
  font-size:14px;color:var(--text-dim);
  line-height:1.9;max-width:260px;
  position:relative;z-index:1;
}
.wish-icons{font-size:28px;margin-top:14px;letter-spacing:4px}

.btn-again{
  margin-top:30px;
  background:transparent;
  border:1.5px solid var(--cyan);
  color:var(--cyan);
  border-radius:12px;padding:13px 48px;
  font-size:14px;font-weight:700;
  font-family:'Orbitron',sans-serif;
  cursor:pointer;letter-spacing:1px;
  box-shadow:0 4px 14px rgba(0,153,204,.12);
  transition:all .2s;position:relative;z-index:1;
}
.btn-again:hover{background:rgba(0,153,204,.06)}

/* ═══════════════════════════════════
   LOADING
═══════════════════════════════════ */
.loading{
  display:none;position:fixed;inset:0;z-index:200;
  flex-direction:column;align-items:center;justify-content:center;
  gap:14px;background:rgba(224,242,255,.9);backdrop-filter:blur(6px);
}
.loading.show{display:flex}
.orbit{
  width:44px;height:44px;position:relative;
}
.orbit::before,.orbit::after{
  content:'';position:absolute;inset:0;border-radius:50%;border:2px solid transparent;
}
.orbit::before{
  border-top-color:var(--cyan);
  animation:spin .7s linear infinite;
}
.orbit::after{
  border-bottom-color:rgba(0,153,204,.25);
  animation:spin .7s linear infinite reverse;
}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{
  font-size:12px;color:var(--cyan);
  font-family:'Orbitron',sans-serif;
  letter-spacing:3px;
}
</style>
</head>
<body>

<!-- Status bar -->
<div class="statusbar">
  <span class="sb-time" id="sbTime">09:41</span>
  <div class="sb-icons">
    <span>●●●</span>
    <span>5G</span>
    <span>⬛</span>
  </div>
</div>

<!-- Banner -->
<div class="banner" id="banner">
  <div class="stars" id="starsContainer"></div>
  <div class="banner-glow" id="bannerGlow"></div>
  <div class="scanline"></div>
  <div class="banner-inner">
    <div class="banner-nav">
      <div class="brand">
        <div class="brand-logo">
          <img src="/static/logo.png" style="width:100%;height:100%;object-fit:contain;border-radius:8px"
               onerror="this.style.display='none';this.insertAdjacentText('afterend','I')" alt="logo">
        </div>
        <div class="brand-info">
          <div class="brand-name">ICODE</div>
          <div class="brand-sub">COMPETITION · CHECK-IN</div>
        </div>
      </div>
      <div class="live-dot">
        <div class="live-pulse"></div>
        LIVE
      </div>
    </div>

    <div class="banner-eyebrow">
      <div class="eyebrow-text">WELCOME</div>
      <div class="eyebrow-line"></div>
    </div>

    <div class="banner-title" id="bannerTitle">
      欢迎参加 <span class="hl">ICode</span><br>青少年编程大赛
    </div>

    <div class="banner-meta" id="bannerMeta"></div>
  </div>
</div>

<!-- Notice -->
<div class="notice" id="notice">
  <span style="font-size:16px;flex-shrink:0;margin-top:1px">📢</span>
  <div class="notice-text" id="noticeText"></div>
</div>

<!-- 云相册按钮 -->
<div id="albumBtn" style="display:none;margin:10px 14px 0;padding:11px 18px;
     background:linear-gradient(135deg,#0088bb,#00aadd);border-radius:12px;
     align-items:center;gap:10px;cursor:pointer;
     box-shadow:0 2px 10px rgba(0,136,187,.3);transition:opacity .2s"
     onmouseover="this.style.opacity='.88'" onmouseout="this.style.opacity='1'">
  <span style="font-size:20px">📸</span>
  <div>
    <div style="font-weight:700;color:#fff;font-size:14px">云相册</div>
    <div style="font-size:11px;color:rgba(255,255,255,.75)">点击查看比赛照片</div>
  </div>
  <span style="margin-left:auto;color:rgba(255,255,255,.8);font-size:18px">›</span>
</div>

<!-- Content -->
<div class="content">
  <!-- Query card -->
  <div class="card">
    <div class="card-body" style="padding-top:18px">
      <div class="query-hint" id="queryHint">
        <strong>输入报名编号或选手账号</strong>完成签到
      </div>
      <div class="err-bar" id="errBar"><span>⚠</span><span id="errMsg"></span></div>
      <div class="input-wrap">
        <span class="input-icon">🎫</span>
        <textarea class="query-input" id="queryInput"
          placeholder="例：IC2025001" rows="2"></textarea>
      </div>
      <div class="tip-row">
        <div class="tip-dot"></div>
        <span>多人签到：用空格分隔，如 IC001 IC002 IC003</span>
      </div>
      <button class="btn-query" id="queryBtn" onclick="doQuery()">查 询</button>
    </div>
  </div>

  <!-- Results -->
  <div class="results" id="results">
    <div class="results-hd">
      <div class="results-label">RESULTS</div>
      <div class="results-count" id="resCnt"></div>
    </div>
    <div id="resContent"></div>
    <button class="btn-checkin" id="checkinBtn" onclick="doCheckin()" disabled>
      请先选择要签到的选手
    </button>
  </div>
</div>

<!-- Success screen -->
<div class="success" id="successScreen">
  <div class="confetti-wrap" id="confettiWrap"></div>
  <div class="success-ring">✓</div>
  <div class="success-title">CHECK IN!</div>
  <div class="success-sub">签到成功</div>
  <div class="success-names" id="successNames"></div>
  <div class="success-wish">
    感谢参赛！祝您在本次 ICode 大赛中<br>充分展示才华，取得优异成绩！
    <div class="wish-icons">🏆 🚀 💻</div>
  </div>
  <button class="btn-again" onclick="resetAll()">退 出</button>
</div>

<!-- Loading -->
<div class="loading" id="loading">
  <div class="orbit"></div>
  <div class="loading-text">SCANNING...</div>
</div>

<script>
const SHIRT_CLR={XS:'#c084fc',S:'#60a5fa',M:'#34d399',L:'#fbbf24',XL:'#f87171',XXL:'#f472b6'}
const FL={name:'姓名',player_no:'报名编号',account:'账号',school:'学校',grade:'年级',
  group_name:'组别',comp_date:'比赛日期',session:'场次',seat_no:'座位号',
  shirt_size:'衣服尺码',checked_in:'签到状态',checkin_time:'签到时间',remark:'备注'}

let CID=null, COMP=null, players=[], dispFields=[], selIds=new Set()

// ─ Clock ─────────────────────────────────────────────────────────
;(function tick(){
  const d=new Date()
  document.getElementById('sbTime').textContent=
    `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`
  setTimeout(tick,30000)
})()

// ─ Stars ─────────────────────────────────────────────────────────
function genStars(){
  const c=document.getElementById('starsContainer')
  for(let i=0;i<30;i++){
    const el=document.createElement('div')
    el.className='star'
    const sz=Math.random()*2+1
    el.style.cssText=`
      width:${sz}px;height:${sz}px;
      top:${Math.random()*100}%;
      left:${Math.random()*100}%;
      --dur:${2+Math.random()*4}s;
      --del:${Math.random()*3}s;
    `
    c.appendChild(el)
  }
}
genStars()

// ─ Init ──────────────────────────────────────────────────────────
async function init(){
  const path=location.pathname
  const m=path.match(/\/c\/(\d+)/)
  const params=new URLSearchParams(location.search)
  CID=m?parseInt(m[1]):(params.get('cid')?parseInt(params.get('cid')):null)
  if(CID){
    await loadComp(CID)
  } else {
    const res=await fetch('/api/pub/competitions')
    const comps=await res.json()
    if(comps.length){CID=comps[0].id;await loadComp(CID)}
  }
}

async function loadComp(id){
  const res=await fetch(`/api/pub/competition/${id}`)
  if(!res.ok){showErr('该赛事不存在或已关闭');return}
  COMP=await res.json()
  applyTheme()
}

function applyTheme(){
  if(!COMP)return
  const bg=COMP.banner_color||'#1a6fa8'
  const accent=COMP.banner_accent||'#0099cc'
  document.documentElement.style.setProperty('--cyan',accent)
  document.documentElement.style.setProperty('--cyan-dim',hexToRgba(accent,.1))
  document.documentElement.style.setProperty('--cyan-glow',hexToRgba(accent,.2))
  document.getElementById('banner').style.background=bg
  document.getElementById('bannerGlow').style.background=
    `radial-gradient(${hexToRgba('#ffffff',.12)},transparent 70%)`
  // Banner title
  const title=COMP.banner_text||'欢迎参加ICode比赛'
  const idx=title.indexOf('ICode')
  if(idx>=0){
    document.getElementById('bannerTitle').innerHTML=
      esc(title.slice(0,idx))+'<span class="hl">ICode</span>'+esc(title.slice(idx+5))
  } else {
    document.getElementById('bannerTitle').textContent=title
  }
  // Meta：地点 + 日期单独一行
  const metas=[]
  if(COMP.location)metas.push({e:'📍',t:COMP.location})
  if(COMP.start_time){
    const dateStr=COMP.start_time.slice(0,10)
    const endDate=COMP.end_time?(COMP.end_time.slice(0,10)!==dateStr?' ~ '+COMP.end_time.slice(0,10):''):''
    metas.push({e:'📅',t:dateStr+endDate})
  }
  document.getElementById('bannerMeta').innerHTML=metas.map(m=>
    `<div class="meta-badge">${m.e} ${esc(m.t)}</div>`).join('')
  // Notice：说明文字 + 图片
  if(COMP.description||COMP.description_images){
    const imgs=JSON.parse(COMP.description_images||'[]')
    let html=''
    if(COMP.description) html+=`<div>${esc(COMP.description)}</div>`
    if(imgs.length) html+=imgs.map(u=>`<img src="${u}" style="max-width:100%;border-radius:8px;margin-top:8px;display:block" onerror="this.style.display='none'">`).join('')
    document.getElementById('noticeText').innerHTML=html
    document.getElementById('notice').classList.add('show')
  }
  // 云相册按钮
  const albumBtn=document.getElementById('albumBtn')
  if(COMP.album_url){
    albumBtn.style.display='flex'
    albumBtn.onclick=()=>window.open(COMP.album_url,'_blank')
  } else {
    albumBtn.style.display='none'
  }
  if(COMP.query_hint){
    document.getElementById('queryHint').innerHTML=`<strong>${esc(COMP.query_hint)}</strong>`
  }
}

function hexToRgba(hex,a){
  const r=parseInt(hex.slice(1,3),16)
  const g=parseInt(hex.slice(3,5),16)
  const b=parseInt(hex.slice(5,7),16)
  return `rgba(${r},${g},${b},${a})`
}

// ─ Query ─────────────────────────────────────────────────────────
async function doQuery(){
  const q=document.getElementById('queryInput').value.trim()
  if(!q){showErr('请输入查询内容');return}
  if(!CID){showErr('赛事加载中，请稍候');return}
  hideErr();showLoading()
  try{
    const res=await fetch('/api/pub/query',{method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({competition_id:CID,query:q})})
    const data=await res.json()
    if(!res.ok){showErr(data.error);return}
    players=data.players; dispFields=data.display_fields
    selIds=new Set()
    renderResults()
  } finally { hideLoading() }
}

function renderResults(){
  const sec=document.getElementById('results')
  sec.classList.add('show')
  const unchk=players.filter(p=>!p.checked_in).length
  document.getElementById('resCnt').textContent=`${players.length} 人 · ${unchk} 待签到`
  if(players.length===1) renderSingle(players[0])
  else renderMulti(players)
  updateBtn()
  setTimeout(()=>sec.scrollIntoView({behavior:'smooth',block:'start'}),80)
}

function renderSingle(p){
  const chk=p.checked_in
  const fields=dispFields.filter(f=>f!=='name')
  if(!chk)selIds.add(p.id)
  document.getElementById('resContent').innerHTML=`
    <div class="pcard ${chk?'done':'selectable'} ${!chk?'selected':''}" id="pc-${p.id}"
         onclick="${chk?'':'toggleCard('+p.id+')'}">
      <div class="pcard-hero">
        <div class="pcard-left">
          <div class="pcard-avatar">${p.name[0]}</div>
          <div>
            <div class="pcard-name">${esc(p.name)}</div>
            <div class="pcard-no">${esc(p.player_no||p.account||'—')}</div>
          </div>
        </div>
        <div class="status-pill ${chk?'sp-done':'sp-pending'}">${chk?'✓ 已签到':'PENDING'}</div>
      </div>
      <div class="pcard-fields">
        ${fields.map(f=>`
          <div class="pf-item${f==='remark'?' full':''}">
            <div class="pf-label">${FL[f]||f}</div>
            <div class="pf-value">${fmtVal(f,p[f])}</div>
          </div>`).join('')}
      </div>
      ${!chk
        ? `<div class="pcard-sel">
             <div class="sel-chk" id="sc-${p.id}">✓</div>
             <span>点击卡片选中 / 取消选中</span>
           </div>`
        : `<div class="pcard-sel" style="justify-content:center;color:rgba(0,230,118,.5);font-size:12px">
             该选手已完成签到
           </div>`}
    </div>`
}

function renderMulti(ps){
  const cols=dispFields.filter(f=>f!=='name')
  document.getElementById('resContent').innerHTML=`
    <div class="tbl-scroll">
      <table>
        <thead><tr>
          <th></th><th>姓名</th>
          ${cols.map(f=>`<th>${FL[f]||f}</th>`).join('')}
          <th>状态</th>
        </tr></thead>
        <tbody>
          ${ps.map(p=>{
            const chk=p.checked_in
            return `<tr class="${chk?'tr-done':''}" id="tr-${p.id}"
                        onclick="${chk?'':'toggleRow('+p.id+')'}">
              <td>
                <div class="tcb ${chk?'':'selectable'} ${!chk&&selIds.has(p.id)?'on':''}"
                     id="tc-${p.id}" ${chk?'style="opacity:.25"':''}>✓</div>
              </td>
              <td><strong>${esc(p.name)}</strong></td>
              ${cols.map(f=>`<td>${fmtVal(f,p[f])}</td>`).join('')}
              <td>
                ${chk
                  ? `<span style="color:var(--green);font-size:11px;font-weight:700">✓ 已签到</span>`
                  : `<span style="color:var(--orange);font-size:11px;font-weight:700">PENDING</span>`}
              </td>
            </tr>`}).join('')}
        </tbody>
      </table>
    </div>`
}

function toggleCard(id){
  const p=players.find(x=>x.id===id);if(!p||p.checked_in)return
  const el=document.getElementById('pc-'+id)
  const sc=document.getElementById('sc-'+id)
  if(selIds.has(id)){selIds.delete(id);el.classList.remove('selected')}
  else{selIds.add(id);el.classList.add('selected')}
  updateBtn()
}

function toggleRow(id){
  const p=players.find(x=>x.id===id);if(!p||p.checked_in)return
  const cb=document.getElementById('tc-'+id)
  const tr=document.getElementById('tr-'+id)
  if(selIds.has(id)){selIds.delete(id);cb.classList.remove('on');tr.classList.remove('tr-sel')}
  else{selIds.add(id);cb.classList.add('on');tr.classList.add('tr-sel')}
  updateBtn()
}

function updateBtn(){
  const btn=document.getElementById('checkinBtn'),n=selIds.size
  btn.disabled=n===0
  btn.textContent=n>0?`确认签到  ( ${n} 人 )  ✓`:'请先选择要签到的选手'
}

async function doCheckin(){
  if(!selIds.size)return
  const btn=document.getElementById('checkinBtn')
  btn.disabled=true;btn.textContent='处理中...'
  try{
    const res=await fetch('/api/pub/checkin',{method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({player_ids:[...selIds]})})
    const data=await res.json()
    if(res.ok){
      document.getElementById('successNames').textContent=data.names.join('、')
      spawnConfetti()
      document.getElementById('successScreen').classList.add('show')
    }
  }catch{
    btn.disabled=false;updateBtn()
  }
}

function spawnConfetti(){
  const wrap=document.getElementById('confettiWrap'); wrap.innerHTML=''
  const colors=['#00d4ff','#ff6b35','#00e676','#fbbf24','#c084fc','#f472b6']
  for(let i=0;i<60;i++){
    const el=document.createElement('div'); el.className='conf'
    const sz=4+Math.random()*8
    el.style.cssText=`
      left:${Math.random()*100}%;
      width:${sz}px;height:${sz}px;
      background:${colors[i%colors.length]};
      border-radius:${Math.random()>.5?'50%':'2px'};
      --dur:${2.5+Math.random()*2.5}s;
      --del:${Math.random()*1.5}s;
    `
    wrap.appendChild(el)
  }
}

function resetAll(){
  document.getElementById('successScreen').classList.remove('show')
  document.getElementById('results').classList.remove('show')
  document.getElementById('queryInput').value=''
  players=[];selIds=new Set();hideErr();updateBtn()
}

function fmtVal(f,v){
  if(!v&&v!==0)return'—'
  if(f==='shirt_size'&&v){
    const c=SHIRT_CLR[v]||'#7a9bb5'
    return`<span class="shirt" style="background:${c}18;color:${c};border:1px solid ${c}30">${v}</span>`
  }
  if(f==='checked_in') return v?'✓ 已签到':'—'
  return esc(String(v))
}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function showErr(m){document.getElementById('errMsg').textContent=m;document.getElementById('errBar').classList.add('show')}
function hideErr(){document.getElementById('errBar').classList.remove('show')}
function showLoading(){document.getElementById('loading').classList.add('show')}
function hideLoading(){document.getElementById('loading').classList.remove('show')}

document.getElementById('queryInput').addEventListener('keydown',e=>{
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();doQuery()}
})

init()
</script>
</body>
</html>
